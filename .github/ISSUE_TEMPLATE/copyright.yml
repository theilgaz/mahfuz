name: "Telif Hakkı Bildirimi"
description: "Telif hakkı ihlali bildirimi için bu formu kullanın."
title: "[Telif] "
labels: ["telif", "öncelikli"]
body:
  - type: markdown
    attributes:
      value: |
        ## Telif Hakkı Bildirimi

        Mahfuz, Kur'an-ı Kerim'e erişimi kolaylaştırmak amacıyla geliştirilen açık kaynaklı bir projedir. İçeriklerimizin tamamı, kaynaklarına atıfta bulunularak kullanılmaktadır.

        Telif hakkı ihlaline konu olduğunu düşündüğünüz bir içerik varsa aşağıdaki formu doldurarak bize bildirin. Başvurunuz en kısa sürede değerlendirilecektir.

  - type: input
    id: name
    attributes:
      label: "Ad Soyad / Kurum"
      description: "Başvuru sahibinin adı veya temsil ettiği kurum"
      placeholder: "örn. Prof. Dr. Ahmet Yılmaz / XYZ Yayınevi"
    validations:
      required: true

  - type: input
    id: email
    attributes:
      label: "İletişim E-postası"
      description: "Size geri dönüş yapabilmemiz için e-posta adresiniz"
      placeholder: "ornek@email.com"
    validations:
      required: true

  - type: dropdown
    id: content-type
    attributes:
      label: "İçerik Türü"
      description: "Telif hakkına konu olan içerik türü"
      options:
        - "Meal / Çeviri metni"
        - "Yazı tipi / Font"
        - "Ses / Tilâvet kaydı"
        - "Görsel / Tasarım"
        - "Diğer"
    validations:
      required: true

  - type: input
    id: content-name
    attributes:
      label: "İlgili İçerik"
      description: "Hangi meal, yazı tipi veya içerik ile ilgili?"
      placeholder: "örn. Ömer Çelik Meali, KFGQPC Uthmani Hafs fontu"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: "Açıklama"
      description: "Telif hakkı iddiasının detayları. Hangi içerik, nerede kullanılıyor, hak sahipliği bilgisi."
      placeholder: |
        - Hangi içerik telif hakkına konu?
        - Hak sahipliği nasıl kanıtlanabilir?
        - Uygulamada nerede kullanılıyor?
    validations:
      required: true

  - type: dropdown
    id: action-requested
    attributes:
      label: "Talep Edilen İşlem"
      description: "Bu içerik için ne yapılmasını istiyorsunuz?"
      options:
        - "İçeriğin kaldırılması"
        - "Kaynak atfının düzeltilmesi / eklenmesi"
        - "Lisans koşullarının güncellenmesi"
        - "İletişime geçilmesi (öncelikle görüşmek istiyorum)"
    validations:
      required: true

  - type: textarea
    id: evidence
    attributes:
      label: "Destekleyici Belge / Link"
      description: "Hak sahipliğinizi gösteren belge, link veya referans (varsa)"
      placeholder: "örn. Yayınevi sözleşmesi, ISBN, resmî web sitesi linki"
    validations:
      required: false

  - type: checkboxes
    id: declaration
    attributes:
      label: "Beyan"
      description: "Aşağıdaki beyanları onaylayın"
      options:
        - label: "Bu bildirimde yer alan bilgilerin doğru olduğunu beyan ederim."
          required: true
        - label: "İlgili içerik üzerinde telif hakkı sahibi veya yetkili temsilcisi olduğumu beyan ederim."
          required: true
